version: "3.8"

services:
  backend:
    build: ./backend
    container_name: iot-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: always

  frontend:
    build: ./frontend
    container_name: iot-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always